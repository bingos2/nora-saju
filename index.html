<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nora's Room</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: 
        radial-gradient(circle at 20% 30%, rgba(201,169,233,0.15), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(168,218,220,0.12), transparent 50%),
        linear-gradient(180deg, #12111A 0%, #0A0912 100%);
      background-attachment: fixed;
      color: #F5F3FA;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 10px;
    }

    .phone {
      width: 100%;
      max-width: 420px;
      height: 100%;
      max-height: 820px;
      background: rgba(18,17,26,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(201,169,233,0.2);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }

    /* Status Bar */
    .status-bar {
      padding: 14px 20px 8px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.3);
      font-size: 14px;
      font-weight: 600;
      color: #F5F3FA;
    }

    .status-time {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: -0.3px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }

    .status-icon {
      opacity: 0.9;
    }

    /* Screens */
    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .screen.active {
      display: flex;
    }

    /* Cover Screen */
    .cover {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 30px;
      text-align: center;
      flex: 1;
      overflow-y: auto;
    }

    .hero {
      width: 100%;
      height: 550px;
      background: linear-gradient(135deg, rgba(201,169,233,0.2) 0%, rgba(168,218,220,0.2) 100%);
      border-radius: 24px;
      margin-bottom: 30px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero video {
      width: 100%;
      height: 100%;
      object-fit: cover;  /* contain → cover */
    }

    .hero-placeholder {
      width: 100%;
      height: 100%;
      display: none;  /* flex → none */
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;  /* 6px → 4px */
      background: linear-gradient(135deg, #C9A9E9 0%, #E8B4D3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 15px;  /* 16px → 15px */
      color: #B8A8C8;
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .cta-button {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 40px;
      background: linear-gradient(135deg, #C9A9E9 0%, #E8B4D3 100%);
      color: white;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(201,169,233,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(201,169,233,0.5);
    }

    .cta-button:active {
      transform: translateY(0);
    }

    .footer-text {
      margin-top: 20px;
      font-size: 13px;
      color: #7a6b8a;
    }

    /* DM Screen */
    .dm-header {
      padding: 20px;
      border-bottom: 1px solid rgba(201,169,233,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      align-self: flex-start;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #C9A9E9;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      color: #E8B4D3;
      transform: translateX(-2px);
    }

    .back-btn:active {
      transform: translateX(0);
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #C9A9E9 0%, #A8DADC 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      overflow: hidden;
      border: none;  /* 테두리 제거 */
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-placeholder {
      font-size: 32px;
    }

    .dm-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
    }

    /* Chat Area */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat::-webkit-scrollbar {
      width: 0;
    }

    .message {
      display: flex;
      gap: 8px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.nora {
      justify-content: flex-start;
    }

    .message.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 22px;
      font-size: 15px;
      line-height: 1.5;
    }

    .message.nora .bubble {
      background: #2A2838;
      color: #F5F3FA;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #3A2F45 0%, #4A3F55 100%);
      color: white;
    }

    /* Typing Indicator */
    .typing {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #2A2838;
      border-radius: 22px;
      width: fit-content;
    }

    .typing.show {
      display: flex;
    }

    .typing-text {
      font-size: 13px;
      color: #B8A8C8;
    }

    .dots {
      display: flex;
      gap: 4px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #C9A9E9;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    /* Input Area */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid rgba(201,169,233,0.1);
      display: none;
    }

    .input-area.show {
      display: block;
    }

    .choices {
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .choices.show {
      display: flex;
    }

    .choice-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 12px 16px;
      background: #3A2F45;
      color: white;
      border: 1px solid rgba(201,169,233,0.2);
      border-radius: 22px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .choice-btn:hover {
      background: #4A3F55;
      border-color: rgba(201,169,233,0.4);
    }

    .choice-btn:active {
      transform: scale(0.98);
    }

    /* Category buttons grid */
    .category-grid {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .category-grid.show {
      display: grid;
    }

    .category-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 16px;
      background: linear-gradient(135deg, #3A2F45 0%, #4A3F55 100%);
      color: white;
      border: 1px solid rgba(201,169,233,0.3);
      border-radius: 18px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .category-btn:hover {
      background: linear-gradient(135deg, #4A3F55 0%, #5A4F65 100%);
      border-color: rgba(201,169,233,0.5);
      transform: translateY(-2px);
    }

    .category-btn:active {
      transform: translateY(0);
    }

    .category-btn.viewed {
      opacity: 0.5;
      background: #2A2838;
    }

    .text-input-wrapper {
      display: none;
      gap: 10px;
    }

    .text-input-wrapper.show {
      display: flex;
    }

    .text-input {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 12px 16px;
      background: rgba(42,40,56,0.6);
      border: 1px solid rgba(201,169,233,0.2);
      border-radius: 22px;
      color: #F5F3FA;
      outline: none;
    }

    .text-input::placeholder {
      color: #7a6b8a;
    }

    .text-input:focus {
      border-color: rgba(201,169,233,0.5);
    }

    .send-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 24px;
      background: linear-gradient(135deg, #C9A9E9 0%, #E8B4D3 100%);
      color: white;
      border: none;
      border-radius: 22px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(201,169,233,0.4);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    /* Dropdowns */
    .dropdown-group {
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .dropdown-group.show {
      display: flex;
    }

    .dropdown-row {
      display: flex;
      gap: 10px;
    }

    select {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 12px;
      background: rgba(42,40,56,0.6);
      border: 1px solid rgba(201,169,233,0.2);
      border-radius: 16px;
      color: #F5F3FA;
      outline: none;
      cursor: pointer;
    }

    select:focus {
      border-color: rgba(201,169,233,0.5);
    }

    option {
      background: #2A2838;
      color: #F5F3FA;
    }
  </style>
</head>
<body>

<div class="phone">
  
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-time" id="statusTime">12:55</div>
    <div class="status-icons">
      <span class="status-icon">📶</span>
      <span class="status-icon">🔋</span>
      <span class="status-icon" id="statusBattery">98%</span>
    </div>
  </div>
  
  <!-- Cover Screen -->
  <div class="screen active" id="coverScreen">
    <div class="cover">
      <div class="hero">
        <video autoplay muted loop playsinline id="heroVideo">
          <source src="nora-hero.mp4" type="video/mp4">
        </video>
        <div class="hero-placeholder" id="heroPlaceholder">🌙</div>
      </div>
      <h1 class="title">Nora Reads You</h1>
      <p class="subtitle">Korean fortune-telling that actually gets you.</p>
      <button class="cta-button" id="startBtn">I'm curious</button>
      <p class="footer-text">Free · Private · 3 min</p>
    </div>
  </div>

  <!-- DM Screen -->
  <div class="screen" id="dmScreen">
    <div class="dm-header">
      <button class="back-btn" id="backBtn">← Back</button>
      <div class="avatar">
        <img src="nora-avatar.jpg" alt="Nora" id="avatarImg" style="display:none;">
        <div class="avatar-placeholder" id="avatarPlaceholder">✨</div>
      </div>
      <div class="dm-name">Nora</div>
    </div>

    <div class="chat" id="chat">
      <div class="typing" id="typing">
        <span class="typing-text">Nora is typing</span>
        <div class="dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>

    <div class="input-area" id="inputArea">
      <div class="choices" id="choices"></div>
      <div class="category-grid" id="categoryGrid"></div>
      <div class="text-input-wrapper" id="textInput">
        <input type="text" class="text-input" id="textField" placeholder="">
        <button class="send-btn" id="sendBtn">Send</button>
      </div>
      <div class="dropdown-group" id="dropdowns"></div>
    </div>

  </div>

</div>


<script>
document.addEventListener('DOMContentLoaded', function() {
  console.log('🚀 Nora app loaded');

  // Update status bar time
  function updateStatusTime() {
    const now = new Date();
    const hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('statusTime').textContent = `${hours}:${minutes}`;
  }
  updateStatusTime();
  setInterval(updateStatusTime, 60000); // Update every minute

  // Check if video and avatar exist
  const heroVideo = document.getElementById('heroVideo');
  const heroPlaceholder = document.getElementById('heroPlaceholder');
  const avatarImg = document.getElementById('avatarImg');
  const avatarPlaceholder = document.getElementById('avatarPlaceholder');

  heroVideo.addEventListener('loadeddata', function() {
    heroPlaceholder.style.display = 'none';
  });

  heroVideo.addEventListener('error', function() {
    heroPlaceholder.style.display = 'flex';
  });

  avatarImg.addEventListener('load', function() {
    avatarImg.style.display = 'block';
    avatarPlaceholder.style.display = 'none';
  });

  avatarImg.addEventListener('error', function() {
    avatarPlaceholder.style.display = 'flex';
  });

  // Try to load avatar
  const testImg = new Image();
  testImg.onload = function() {
    avatarImg.style.display = 'block';
    avatarPlaceholder.style.display = 'none';
  };
  testImg.src = 'nora-avatar.jpg';

  // Configuration
  const WEBHOOK_URL = "https://hook.us2.make.com/fjivuprpif5r1asrcclnp1lvelgcc1ms";

  // Elements
  const coverScreen = document.getElementById('coverScreen');
  const dmScreen = document.getElementById('dmScreen');
  const startBtn = document.getElementById('startBtn');
  const backBtn = document.getElementById('backBtn');
  const chat = document.getElementById('chat');
  let typing = document.getElementById('typing');
  const inputArea = document.getElementById('inputArea');
  const choices = document.getElementById('choices');
  const categoryGrid = document.getElementById('categoryGrid');
  const textInput = document.getElementById('textInput');
  const textField = document.getElementById('textField');
  const sendBtn = document.getElementById('sendBtn');
  const dropdowns = document.getElementById('dropdowns');

  // State
  let conversationStarted = false;
  let viewedCategories = [];
  let userData = {
    name: '',
    birthday: '',
    birthday_confirmed: false,
    timezone: '',
    timezone_short: '',
    extras_opt_in: 'no',
    birth_time: 'unknown',
    note: ''
  };

  // Mock saju results
  // Saju results (will be filled from webhook response)
  let sajuResults = null;

  // Screen switching
  startBtn.addEventListener('click', function() {
    console.log('Start button clicked');
    coverScreen.classList.remove('active');
    dmScreen.classList.add('active');
    
    if (!conversationStarted) {
      // Re-reference typing element in case DOM was reset by Start over
      typing = document.getElementById('typing');
      startConversation();
      conversationStarted = true;
    }
  });

  backBtn.addEventListener('click', function() {
    dmScreen.classList.remove('active');
    coverScreen.classList.add('active');
  });

  // Utility functions
  function scrollToBottom() {
    // 즉시 스크롤 (chat 영역 + input area까지)
    chat.scrollTop = chat.scrollHeight + 100;
    // 약간 지연 후 다시 (애니메이션 대응)
    setTimeout(() => {
      chat.scrollTop = chat.scrollHeight + 100;
    }, 50);
    setTimeout(() => {
      chat.scrollTop = chat.scrollHeight + 100;
    }, 200);
  }

  function addMessage(text, sender) {
    const msg = document.createElement('div');
    msg.className = `message ${sender}`;
    msg.innerHTML = `<div class="bubble">${text}</div>`;
    chat.insertBefore(msg, typing);
    scrollToBottom();
  }

  function showTyping(duration = 800) {
    typing.classList.add('show');
    scrollToBottom();
    return new Promise(resolve => {
      setTimeout(() => {
        typing.classList.remove('show');
        resolve();
      }, duration);
    });
  }

  function hideAllInputs() {
    inputArea.classList.remove('show');
    choices.classList.remove('show');
    categoryGrid.classList.remove('show');
    textInput.classList.remove('show');
    dropdowns.classList.remove('show');
  }

  function showChoices(options, callback) {
    hideAllInputs();
    choices.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = opt;
      btn.onclick = () => {
        addMessage(opt, 'user');
        hideAllInputs();
        callback(opt);
      };
      choices.appendChild(btn);
    });
    choices.classList.add('show');
    inputArea.classList.add('show');
    scrollToBottom();
  }

  function showCategories(categories, callback) {
    hideAllInputs();
    categoryGrid.innerHTML = '';
    
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'category-btn';
      if (viewedCategories.includes(cat)) {
        btn.classList.add('viewed');
      }
      btn.textContent = cat;
      btn.onclick = () => {
        if (!viewedCategories.includes(cat)) {
          viewedCategories.push(cat);
        }
        addMessage(cat, 'user');
        hideAllInputs();
        callback(cat);
      };
      categoryGrid.appendChild(btn);
    });
    
    categoryGrid.classList.add('show');
    inputArea.classList.add('show');
    scrollToBottom();
  }

  function showTextInput(placeholder, callback, optional = false) {
    hideAllInputs();
    textField.value = '';
    textField.placeholder = placeholder;
    textInput.classList.add('show');
    inputArea.classList.add('show');
    textField.focus();
    
    const handler = () => {
      const value = textField.value.trim();
      if (value || optional) {
        if (value) addMessage(value, 'user');
        hideAllInputs();
        callback(value);
        sendBtn.removeEventListener('click', handler);
      }
    };
    
    sendBtn.addEventListener('click', handler);
    textField.onkeypress = (e) => {
      if (e.key === 'Enter') handler();
    };
  }

  function showDropdowns(config, callback) {
    hideAllInputs();
    dropdowns.innerHTML = '';
    
    config.forEach(row => {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'dropdown-row';
      
      row.forEach(item => {
        const select = document.createElement('select');
        select.id = item.id;
        item.options.forEach(opt => {
          const option = document.createElement('option');
          option.value = opt.value;
          option.textContent = opt.label;
          if (opt.selected) option.selected = true;
          select.appendChild(option);
        });
        rowDiv.appendChild(select);
      });
      
      dropdowns.appendChild(rowDiv);
    });
    
    const btn = document.createElement('button');
    btn.className = 'send-btn';
    btn.textContent = 'Send';
    btn.style.width = '100%';
    btn.style.marginTop = '10px';
    btn.onclick = () => {
      const values = {};
      config.flat().forEach(item => {
        values[item.id] = document.getElementById(item.id).value;
      });
      hideAllInputs();
      callback(values);
    };
    dropdowns.appendChild(btn);
    
    dropdowns.classList.add('show');
    inputArea.classList.add('show');
    scrollToBottom();
  }

  function detectTimezone() {
    try {
      return Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/New_York';
    } catch {
      return 'America/New_York';
    }
  }

  // Conversation flow
  async function startConversation() {
    // Check localStorage for saved data
    const savedData = localStorage.getItem('nora_user_data');
    if (savedData) {
      try {
        const parsed = JSON.parse(savedData);
        if (parsed.name && parsed.birthday && parsed.timezone_short) {
          await showTyping(650);
          addMessage(`Hey ${parsed.name}!`, 'nora');
          
          await showTyping(700);
          
          // Build info message with birth time if available
          let infoMessage = `I have you as ${parsed.birthday}`;
          if (parsed.birth_time && parsed.birth_time !== 'unknown') {
            // Convert 24h to 12h format for display
            const hour24 = parseInt(parsed.birth_time.split(':')[0]);
            const minute = parsed.birth_time.split(':')[1];
            const hour12 = hour24 === 0 ? 12 : (hour24 > 12 ? hour24 - 12 : hour24);
            const ampm = hour24 >= 12 ? 'PM' : 'AM';
            infoMessage += `, ${hour12}:${minute} ${ampm}`;
          }
          infoMessage += `, ${parsed.timezone_short}.<br>Still accurate?`;
          
          addMessage(infoMessage, 'nora');
          
          showChoices(['Yes', 'Update info'], async (choice) => {
            if (choice === 'Yes') {
              // Use saved data
              userData.name = parsed.name;
              userData.birthday = parsed.birthday;
              userData.timezone = parsed.timezone;
              userData.timezone_short = parsed.timezone_short;
              userData.birth_time = parsed.birth_time || 'unknown';
              userData.birthday_confirmed = true;
              await step4_extras(true); // Returning user
            } else {
              // Update info - ask what to update
              await showTyping(600);
              addMessage("What would you like to update?", 'nora');
              
              showChoices(['Birthday', 'Birth time'], async (updateChoice) => {
                if (updateChoice === 'Birthday') {
                  // Go to birthday input, keep birth_time in localStorage
                  const savedBirthTime = parsed.birth_time; // Save birth time
                  // Don't remove localStorage - just reset userData
                  userData = {
                    name: parsed.name, // Keep name
                    birthday: '',
                    birthday_confirmed: false,
                    timezone: '',
                    timezone_short: '',

 function convertToKST(userData) {
  if (userData.birth_time === 'unknown') {
    return userData;
  }
  
  // Parse input
  const [month, day, year] = userData.birthday.split('/').map(Number);
  const [hour, minute] = userData.birth_time.split(':').map(Number);
  
  // Timezone offsets from UTC (in hours)
  const offsets = {
    'America/New_York': -5,    // EST (winter)
    'America/Chicago': -6,     // CST
    'America/Denver': -7,      // MST
    'America/Los_Angeles': -8, // PST (winter)
    'America/Anchorage': -9,   // AKST
    'Pacific/Honolulu': -10    // HST
  };
  
  const userOffset = offsets[userData.timezone] || -8;
  const kstOffset = 9;
  
  // Convert to UTC, then to KST
  const hoursToAdd = kstOffset - userOffset; // e.g., 9 - (-8) = 17
  
  // Create date and add hours
  let kstDate = new Date(year, month - 1, day, hour, minute);
  kstDate.setHours(kstDate.getHours() + hoursToAdd);
  
  const kstMonth = String(kstDate.getMonth() + 1).padStart(2, '0');
  const kstDay = String(kstDate.getDate()).padStart(2, '0');
  const kstYear = kstDate.getFullYear();
  const kstHour = String(kstDate.getHours()).padStart(2, '0');
  const kstMinute = String(kstDate.getMinutes()).padStart(2, '0');
  
  console.log(`🌍 ${userData.birthday} ${userData.birth_time} ${userData.timezone_short} → ${kstMonth}/${kstDay}/${kstYear} ${kstHour}:${kstMinute} KST`);
  
  return {
    ...userData,
    birthday: `${kstMonth}/${kstDay}/${kstYear}`,
    birth_time: `${kstHour}:${kstMinute}`,
    timezone: 'Asia/Seoul',
    timezone_short: 'KST',
    original_timezone: userData.timezone,
    original_timezone_short: userData.timezone_short
  };
}
