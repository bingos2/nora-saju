<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2D1B4E"/>
      <stop offset="100%" stop-color="#0D0A15"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8D5F8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C9A9E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonFill" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#F0E6FF"/>
      <stop offset="100%" stop-color="#C9A9E9"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#moonGlow)" opacity="0.6"/>

  <!-- Crescent moon -->
  <g filter="url(#softGlow)" transform="translate(256, 215)">
    <circle cx="0" cy="0" r="90" fill="url(#moonFill)"/>
    <circle cx="32" cy="-18" r="78" fill="#1A0F30"/>
  </g>

  <!-- Stars -->
  <g filter="url(#glow)" transform="translate(350, 130)">
    <polygon points="0,-14 3.2,-4.4 13.3,-4.4 5.4,1.7 8.2,11.4 0,5.5 -8.2,11.4 -5.4,1.7 -13.3,-4.4 -3.2,-4.4" fill="#E8D5F8" opacity="0.95"/>
  </g>
  <g filter="url(#glow)" transform="translate(155, 165)">
    <polygon points="0,-10 2.3,-3.1 9.5,-3.1 3.9,1.2 5.9,8.1 0,3.9 -5.9,8.1 -3.9,1.2 -9.5,-3.1 -2.3,-3.1" fill="#C9A9E9" opacity="0.85"/>
  </g>
  <g filter="url(#glow)" transform="translate(290, 105)">
    <polygon points="0,-7 1.6,-2.2 6.7,-2.2 2.7,0.8 4.1,5.7 0,2.8 -4.1,5.7 -2.7,0.8 -6.7,-2.2 -1.6,-2.2" fill="#E8B4D3" opacity="0.9"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="180" cy="260" r="2.5" fill="#C9A9E9" opacity="0.7" filter="url(#glow)"/>
  <circle cx="340" cy="175" r="2" fill="#E8D5F8" opacity="0.6" filter="url(#glow)"/>
  <circle cx="370" cy="290" r="2.2" fill="#E8D5F8" opacity="0.55" filter="url(#glow)"/>
  <circle cx="210" cy="130" r="1.5" fill="#E8B4D3" opacity="0.6"/>

  <!-- NORA text -->
  <text x="256" y="385" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" font-style="italic" letter-spacing="12" text-anchor="middle" fill="#E8D5F8" opacity="0.95">Nora</text>

  <!-- Tagline -->
  <text x="256" y="420" font-family="Georgia, serif" font-size="18" letter-spacing="5" text-anchor="middle" fill="#C9A9E9" opacity="0.6">SAJU READING</text>
</svg>
